<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ボックスガチャ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            text-align: center;
            margin: 0;
            padding: 20px 10px;
        }
        #game-container {
            background-color: #ffffff;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* 3カラムレイアウト（PC用） */
        .layout-wrapper { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 20px; margin-top: 20px; }
        .left-panel { flex: 1; min-width: 200px; max-width: 250px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        .right-panel { flex: 1; min-width: 320px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; display: flex; flex-direction: column; }
        .center-panel { flex: 2; min-width: 350px; max-width: 500px; display: flex; flex-direction: column; align-items: center; }

        h1 { margin-top: 0; color: #333; }
        .info-text { font-size: 18px; font-weight: bold; color: #555; margin-bottom: 15px; }
        
        /* ボタン基本設定 */
        .main-btn {
            font-size: 18px; font-weight: bold; padding: 12px 30px; margin: 5px;
            background-color: #ff4757; color: white; border: none; border-radius: 30px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(255, 71, 87, 0.3); transition: all 0.2s;
        }
        .main-btn:hover:not(:disabled) { transform: scale(1.05); }
        .main-btn:disabled { background-color: #cccccc; cursor: not-allowed; box-shadow: none; transform: none; }

        .sub-btn { font-size: 14px; padding: 10px 15px; margin: 5px; background-color: #1e90ff; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .sub-btn:hover:not(:disabled) { background-color: #1c7ed6; }
        .sub-btn:disabled { background-color: #cccccc; cursor: not-allowed; }

        #draw-all-btn { background-color: #cccccc; color: #888; cursor: not-allowed; transition: all 0.4s ease; }
        #draw-all-btn.unlocked { background-color: #ffa502 !important; color: white !important; cursor: pointer !important; box-shadow: 0 4px 6px rgba(255, 165, 2, 0.3); }
        #draw-all-btn.unlocked:hover:not(:disabled) { transform: scale(1.05); }

        #unlock-btn { background-color: #f1c40f; color: #333; font-size: 16px; font-weight: bold; padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s; }
        #unlock-btn:hover { background-color: #f39c12; }

        .test-btn { display: block; width: 100%; font-size: 14px; padding: 10px; margin: 8px 0; background-color: #2f3542; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .test-btn:hover:not(:disabled) { background-color: #57606f; }
        .test-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 統計表とキャラクター画像 */
        table.stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; background-color: white; font-size: 16px; transition: all 0.3s; }
        table.stats-table th, table.stats-table td { border: 2px solid #ced4da; padding: 12px 8px; text-align: center; }
        table.stats-table th { background-color: #e9ecef; color: #333; }
        .diag-box { position: relative; background: linear-gradient(to top right, transparent 49%, #ced4da 49%, #ced4da 51%, transparent 51%); }
        .diag-top { position: absolute; top: 2px; right: 8px; font-size: 12px; }
        .diag-bottom { position: absolute; bottom: 2px; left: 8px; font-size: 12px; }

        #table-images { display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin-top: 15px; transition: all 0.3s; }
        .char-legend { font-size: 14px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 5px; }
        .char-img { height: 50px; width: auto; object-fit: contain; }

        /* 超特大モード */
        .huge-mode { font-size: 32px !important; } 
        .huge-mode th, .huge-mode td { padding: 15px 10px !important; border-width: 3px !important; }
        .huge-mode .diag-top { font-size: 18px !important; top: 5px; right: 10px; }
        .huge-mode .diag-bottom { font-size: 18px !important; bottom: 5px; left: 10px; }
        .huge-images { justify-content: center !important; gap: 20px !important; margin-top: 20px !important; }
        .huge-images .char-legend { font-size: 20px !important; }
        .huge-images .char-img { height: 80px !important; }

        /* 各種モーダル用オーバーレイ */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .modal-box { background: #ffffff; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; animation: popModal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 90%; max-width: 500px; box-sizing: border-box; }
        @keyframes popModal { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* タブレット用ナンバーパッド */
        #numpad-display { font-size: 32px; letter-spacing: 10px; font-weight: bold; color: #333; background: #f1f2f6; border: 2px solid #ccc; padding: 15px; border-radius: 10px; margin-bottom: 20px; height: 40px; display: flex; justify-content: center; align-items: center; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; }
        .num-btn { background: #2f3542; color: white; font-size: 24px; font-weight: bold; border: none; border-radius: 12px; padding: 15px 0; cursor: pointer; transition: 0.1s; }
        .num-btn:active { transform: scale(0.9); background: #57606f; }
        .num-btn.clear-btn { background: #ff4757; }
        .close-btn { margin-top: 20px; font-size: 20px; font-weight: bold; padding: 12px 30px; background-color: #2ed573; color: white; border: none; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { background-color: #26ae60; transform: scale(1.05); }

        /* --- アニメーションステージとガチャガチャ本体 --- */
        #animation-stage { position: relative; width: 100%; height: 350px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        #gacha-machine { position: absolute; width: 160px; height: 240px; transition: opacity 0.5s ease; z-index: 10; }
        .machine-top { width: 160px; height: 100px; background: rgba(173, 216, 230, 0.5); border: 4px solid #ff4757; border-bottom: none; border-radius: 80px 80px 0 0; position: relative; overflow: hidden; }
        .machine-top::before { content: ''; position: absolute; bottom: 0; left: 20px; width: 40px; height: 40px; background: #ffd700; border-radius: 50%; box-shadow: 50px -20px 0 #c0c0c0, 80px 10px 0 #ff6b81, 10px -40px 0 #1e90ff; }
        .machine-body { width: 160px; height: 140px; background: #ff4757; border: 4px solid #ff4757; border-radius: 0 0 10px 10px; position: relative; }
        .machine-dial { width: 40px; height: 40px; background: #f1f2f6; border-radius: 50%; position: absolute; top: 30px; left: 60px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .machine-slot { width: 60px; height: 40px; background: #1e272e; border-radius: 5px; position: absolute; bottom: 15px; left: 50px; box-shadow: inset 0 6px 10px rgba(0,0,0,0.7); }

        #capsule { position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 3px solid #333; display: none; z-index: 20; top: 220px; left: calc(50% - 40px); transform: scale(0); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .gold { background: radial-gradient(circle at 30% 30%, #fffacd, #ffd700 40%, #b8860b); box-shadow: 0 0 15px #ffd700; }
        .silver { background: radial-gradient(circle at 30% 30%, #ffffff, #e0e0e0 40%, #808080); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        #capsule.eject { transform: scale(0.6) translateY(35px); opacity: 1; }
        #capsule.move-center { top: 100px; transform: scale(1.5) translateY(0); opacity: 1; transition: all 0.6s ease-in-out; }

        #capsule.shake, .temp-capsule.shake { animation: shakeAnim 0.1s infinite; transition: none !important; }
        #capsule.vanish, .temp-capsule.vanish { animation: vanishAnim 0.3s ease-in forwards; transition: none !important; }

        .temp-capsule { position: absolute; width: 50px; height: 50px; border-radius: 50%; border: 3px solid #333; z-index: 25; top: 220px; left: calc(50% - 25px); transform: scale(0); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .temp-capsule.fly-out { opacity: 1; transform: scale(1.2); }

        @keyframes shakeAnim { 0% { transform: scale(1.5) rotate(0deg) translateX(0); } 25% { transform: scale(1.5) rotate(5deg) translateX(5px); } 50% { transform: scale(1.5) rotate(0deg) translateX(0); } 75% { transform: scale(1.5) rotate(-5deg) translateX(-5px); } 100% { transform: scale(1.5) rotate(0deg) translateX(0); } }
        @keyframes vanishAnim { 0% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        #character { position: absolute; max-width: 180px; height: auto; display: none; z-index: 30; }
        .pop-character { animation: popAnim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popAnim { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #result-text { height: 40px; margin-top: 10px; font-weight: bold; }
        .hit { color: #e60000; font-size: 26px; }
        .miss { color: #555; font-size: 20px; }

        /* =========================================
           ▼ スマホ・タブレット用レイアウト調整 ▼
           ========================================= */
        @media (max-width: 1000px) {
            #game-container { padding: 20px 10px; }
            h1 { font-size: 24px; margin-bottom: 15px; }
            
            .layout-wrapper { flex-direction: column; align-items: center; gap: 20px; margin-top: 0; }
            .center-panel { order: 1; width: 100%; max-width: 600px; min-width: unset; padding: 15px 10px; box-sizing: border-box; }
            .right-panel { order: 2; width: 100%; max-width: 600px; min-width: unset; box-sizing: border-box; }
            .left-panel { order: 3; width: 100%; max-width: 600px; min-width: unset; box-sizing: border-box; margin-top: 10px; }

            table.stats-table { font-size: 18px; }
            table.stats-table th, table.stats-table td { padding: 12px 8px; }
            .diag-top { font-size: 12px; top: 3px; right: 8px; }
            .diag-bottom { font-size: 12px; bottom: 3px; left: 8px; }
            
            .char-legend { font-size: 16px; }
            .char-img { height: 60px; }
            .info-text { font-size: 20px; }
            .main-btn { padding: 15px 40px; font-size: 20px; width: 100%; max-width: 350px; box-sizing: border-box; } 
        }

        /* ★新規追加：スマホ（画面幅768px以下）の時にガチャ画面を最大限に大きく表示！ */
        @media (max-width: 768px) {
            #game-container { padding: 10px 5px; } /* 左右の無駄な余白を削る */
            
            /* ガチャのアニメーション（本体・カプセル）を1.3倍に拡大！ */
            #animation-stage {
                /* transform: scale(1.3); */
                height: 420px; /* 拡大した分、高さを広げる */
                margin-top: 30px;
            }

            /* モーダル表示時の表がはみ出さないよう微調整 */
            .modal-box { padding: 20px 10px; width: 95%; max-width: 400px; }
            .huge-mode { font-size: 20px !important; }
            .huge-mode th, .huge-mode td { padding: 10px 5px !important; border-width: 2px !important; }
            .huge-mode .diag-top { font-size: 14px !important; }
            .huge-mode .diag-bottom { font-size: 14px !important; }
            .huge-images { flex-direction: row !important; gap: 15px !important; }
            .huge-images .char-img { height: 60px !important; }
        }
    </style>
</head>
<body>

<div id="modal-overlay" class="overlay" onclick="closeHugeTable()" style="cursor: pointer;">
    <div class="modal-box" style="cursor: default;">
        <h2 style="margin-top:0; font-size:28px; color:#ff4757;">✨ 答え ✨</h2>
        <div id="huge-table-container"></div>
        <button class="close-btn" onclick="closeHugeTable()">閉じる</button>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">※タップしても閉じれます</p>
    </div>
</div>

<div id="numpad-overlay" class="overlay">
    <div class="modal-box" style="padding: 30px; width: 320px;">
        <h3 style="margin-top:0; color:#333;">シークレットコード入力</h3>
        <p style="font-size: 12px; color: #666; margin-bottom: 15px;">ヒント: カプセルの総数は？</p>
        <div id="numpad-display"></div>
        <div class="numpad-grid">
            <button class="num-btn" onclick="inputNumpad('1')">1</button>
            <button class="num-btn" onclick="inputNumpad('2')">2</button>
            <button class="num-btn" onclick="inputNumpad('3')">3</button>
            <button class="num-btn" onclick="inputNumpad('4')">4</button>
            <button class="num-btn" onclick="inputNumpad('5')">5</button>
            <button class="num-btn" onclick="inputNumpad('6')">6</button>
            <button class="num-btn" onclick="inputNumpad('7')">7</button>
            <button class="num-btn" onclick="inputNumpad('8')">8</button>
            <button class="num-btn" onclick="inputNumpad('9')">9</button>
            <button class="num-btn clear-btn" onclick="clearNumpad()">C</button>
            <button class="num-btn" onclick="inputNumpad('0')">0</button>
            <button class="num-btn" style="background:#555;" onclick="closeNumpadModal()">×</button>
        </div>
    </div>
</div>

<div id="game-container">
    <h1>ボックスガチャ シュミレータ</h1>
    <div class="layout-wrapper">
        <div class="left-panel">
            <h3 style="margin-top:0; font-size:16px; color:#333;">▼ 演出確認用</h3>
            <p style="font-size:11px; color:#666; margin-bottom:15px;">※表には反映されません</p>
            <button class="test-btn ctrl-btn" onclick="playGacha(CAPSULE.GOLD_HIT)">金カプセル (当たり)</button>
            <button class="test-btn ctrl-btn" onclick="playGacha(CAPSULE.GOLD_MISS)">金カプセル (ハズレ)</button>
            <button class="test-btn ctrl-btn" onclick="playGacha(CAPSULE.SILVER_HIT)">銀カプセル (当たり)</button>
            <button class="test-btn ctrl-btn" onclick="playGacha(CAPSULE.SILVER_MISS)">銀カプセル (ハズレ)</button>
        </div>

        <div class="center-panel">
            <div class="info-text">残り: <span id="remaining-count">240</span> / 240 個</div>
            <div style="margin-bottom: 10px; width: 100%;">
                <button id="draw-btn" class="main-btn ctrl-btn">ガチャを引く！</button>
            </div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap;">
                <button id="unlock-btn" class="ctrl-btn" onclick="openNumpadModal()">🔑</button>
                <button id="draw-all-btn" class="sub-btn ctrl-btn" disabled>🔒 まとめて引く</button>
                <button id="reset-btn" class="sub-btn ctrl-btn" style="background-color: #6c757d;">リセット</button>
            </div>

            <div id="animation-stage">
                <div id="gacha-machine">
                    <div class="machine-top"></div>
                    <div class="machine-body">
                        <div class="machine-dial"></div>
                        <div class="machine-slot"></div>
                    </div>
                </div>
                <div id="capsule"></div>
                <img id="character" src="" alt="キャラクター">
            </div>
            <div id="result-text"></div>
        </div>

        <div class="right-panel">
            <h3 style="margin-top:0; font-size:16px; color:#333;">▼ 答え</h3>
            <div id="normal-table-container" style="flex: 1;">
                <table class="stats-table" id="main-stats-table">
                    <tr><th class="diag-box" style="height: 45px;"><span class="diag-top">結果</span><span class="diag-bottom">色</span></th><th>当たり</th><th>ハズレ</th><th>計</th></tr>
                    <tr><th>金色</th><td id="s-gh">0</td><td id="s-gm">0</td><td id="s-g-total" style="font-weight:bold;">0</td></tr>
                    <tr><th>銀色</th><td id="s-sh">0</td><td id="s-sm">0</td><td id="s-s-total" style="font-weight:bold;">0</td></tr>
                    <tr><th>計</th><td id="s-h-total" style="font-weight:bold;">0</td><td id="s-m-total" style="font-weight:bold;">0</td><td id="s-all-total" style="font-weight:bold; color:#e60000;">0</td></tr>
                </table>
                <div id="table-images">
                    <div class="char-legend"><span>当たり:</span><img src="001_gacha.png" class="char-img" alt="当たりキャラ" onerror="this.style.display='none'"></div>
                    <div class="char-legend"><span>ハズレ:</span><img src="002_gacha.png" class="char-img" alt="ハズレキャラ" onerror="this.style.display='none'"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const CAPSULE = { GOLD_HIT: 0, GOLD_MISS: 1, SILVER_HIT: 2, SILVER_MISS: 3 };
    let box = [];
    let isAnimating = false;
    let stats = { gh: 0, gm: 0, sh: 0, sm: 0 };
    let isDrawAllUnlocked = false; 

    function initBox() {
        box = [];
        stats = { gh: 0, gm: 0, sh: 0, sm: 0 };
        for (let i = 0; i < 40; i++)  box.push(CAPSULE.GOLD_HIT);
        for (let i = 0; i < 40; i++)  box.push(CAPSULE.GOLD_MISS);
        for (let i = 0; i < 20; i++)  box.push(CAPSULE.SILVER_HIT);
        for (let i = 0; i < 140; i++) box.push(CAPSULE.SILVER_MISS);

        for (let i = box.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [box[i], box[j]] = [box[j], box[i]];
        }
        document.getElementById('remaining-count').innerText = box.length;
        updateTable();
        resetStage();
    }

    function updateTable() {
        document.getElementById('s-gh').innerText = stats.gh;
        document.getElementById('s-gm').innerText = stats.gm;
        document.getElementById('s-sh').innerText = stats.sh;
        document.getElementById('s-sm').innerText = stats.sm;
        const gTotal = stats.gh + stats.gm; const sTotal = stats.sh + stats.sm;
        document.getElementById('s-g-total').innerText = gTotal; document.getElementById('s-s-total').innerText = sTotal;
        const hTotal = stats.gh + stats.sh; const mTotal = stats.gm + stats.sm;
        document.getElementById('s-h-total').innerText = hTotal; document.getElementById('s-m-total').innerText = mTotal;
        document.getElementById('s-all-total').innerText = gTotal + sTotal;
    }

    function recordStat(drawn, updateUI = true) {
        if (drawn === CAPSULE.GOLD_HIT) stats.gh++;
        else if (drawn === CAPSULE.GOLD_MISS) stats.gm++;
        else if (drawn === CAPSULE.SILVER_HIT) stats.sh++;
        else if (drawn === CAPSULE.SILVER_MISS) stats.sm++;
        if(updateUI) updateTable();
    }

    const drawBtn = document.getElementById('draw-btn');
    const drawAllBtn = document.getElementById('draw-all-btn');
    const resetBtn = document.getElementById('reset-btn');
    const unlockBtn = document.getElementById('unlock-btn');
    const ctrlBtns = document.querySelectorAll('.ctrl-btn');
    
    const machine = document.getElementById('gacha-machine');
    const capsule = document.getElementById('capsule');
    const character = document.getElementById('character');
    const resultText = document.getElementById('result-text');
    const stage = document.getElementById('animation-stage');

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function toggleButtons(disabled) {
        ctrlBtns.forEach(btn => btn.disabled = disabled);
        if (!disabled) { if (!isDrawAllUnlocked || box.length === 0) drawAllBtn.disabled = true; }
    }

    function resetStage() {
        resultText.innerHTML = '';
        character.style.display = 'none';
        character.classList.remove('pop-character');
        capsule.style.display = 'none';
        capsule.classList.remove('eject', 'move-center', 'shake', 'vanish');
        machine.style.display = 'block';
        machine.style.opacity = '1';
        toggleButtons(false);
    }

    /* パスワード関連 */
    let currentPin = "";
    const numpadDisplay = document.getElementById('numpad-display');
    function openNumpadModal() { currentPin = ""; numpadDisplay.innerText = ""; numpadDisplay.style.color = "#333"; document.getElementById('numpad-overlay').style.display = 'flex'; }
    function closeNumpadModal() { document.getElementById('numpad-overlay').style.display = 'none'; }
    function inputNumpad(num) {
        if (currentPin.length < 3) { currentPin += num; numpadDisplay.innerText = currentPin; }
        if (currentPin.length === 3) setTimeout(checkPassword, 200);
    }
    function clearNumpad() { currentPin = ""; numpadDisplay.innerText = ""; numpadDisplay.style.color = "#333"; }
    function checkPassword() {
        if (currentPin === "240") {
            numpadDisplay.style.color = "#2ed573";
            setTimeout(() => { closeNumpadModal(); unlockDrawAllFeature(); }, 500);
        } else {
            numpadDisplay.style.color = "#ff4757";
            setTimeout(() => { clearNumpad(); }, 500);
        }
    }
    function unlockDrawAllFeature() {
        isDrawAllUnlocked = true;
        drawAllBtn.classList.add('unlocked'); drawAllBtn.innerHTML = '残りをまとめて引く！';
        unlockBtn.style.display = 'none';
        if (box.length > 0) drawAllBtn.disabled = false;
        resultText.innerHTML = '✨ シークレット機能を解放しました ✨';
    }

    /* 1回引く */
    async function playGacha(forcedType = null) {
        if (isAnimating) return;
        if (forcedType === null && box.length === 0) { alert('ボックスの中身が空です！リセットしてください。'); return; }

        isAnimating = true;
        toggleButtons(true);
        resetStage();

        let currentDrawn = forcedType !== null ? forcedType : box.pop();
        if(forcedType === null) document.getElementById('remaining-count').innerText = box.length;

        const isGold = (currentDrawn === CAPSULE.GOLD_HIT || currentDrawn === CAPSULE.GOLD_MISS);
        const isHit = (currentDrawn === CAPSULE.GOLD_HIT || currentDrawn === CAPSULE.SILVER_HIT);

        capsule.className = isGold ? 'gold' : 'silver';
        capsule.style.display = 'block';
        
        await sleep(50);

        capsule.classList.add('eject');
        await sleep(600); 

        machine.style.opacity = '0';
        await sleep(300); 

        capsule.classList.remove('eject');
        capsule.classList.add('move-center');
        await sleep(600); 
        machine.style.display = 'none';

        capsule.classList.add('shake');
        await sleep(1500); 
        capsule.classList.remove('shake');

        capsule.classList.add('vanish');
        await sleep(300);
        capsule.style.display = 'none';
        
        character.src = isHit ? '001_gacha.png' : '002_gacha.png';
        character.style.display = 'block';
        character.classList.add('pop-character');

        if (forcedType === null) recordStat(currentDrawn, true);

        if (isHit) {
            resultText.innerHTML = '🎉 当たり！！！ 🎉'; resultText.className = 'hit';
        } else {
            resultText.innerHTML = 'ハズレ...'; resultText.className = 'miss';
        }

        isAnimating = false;
        toggleButtons(false);
        if (box.length === 0) {
            drawBtn.disabled = true; drawAllBtn.disabled = true;
            resultText.innerHTML += '<br><span style="font-size:14px; color:#333;">ボックスの中身が空になりました！</span>';
        }
    }

    /* 10連噴水演出 */
    async function playDrawAll() {
        if (isAnimating || box.length === 0 || !isDrawAllUnlocked) return;
        isAnimating = true;
        toggleButtons(true);
        resetStage();
        
        machine.style.display = 'block';
        machine.style.opacity = '1';

        let animCount = Math.min(box.length, 10);
        let tempCapsules = [];

        for (let i = 0; i < animCount; i++) {
            let cap = document.createElement('div');
            let isGoldAnim = Math.random() < 0.2;
            cap.className = `temp-capsule ${isGoldAnim ? 'gold' : 'silver'}`;
            stage.appendChild(cap);
            tempCapsules.push(cap);
            
            await sleep(50);
            
            cap.style.left = Math.floor(Math.random() * 60 + 20) + '%';
            cap.style.top = Math.floor(Math.random() * 40 + 10) + '%';
            cap.classList.add('fly-out');
            
            await sleep(100);
        }

        await sleep(400);
        
        machine.style.opacity = '0';
        tempCapsules.forEach(c => c.classList.add('shake'));
        await sleep(1500);
        
        machine.style.display = 'none';

        tempCapsules.forEach(c => { c.classList.remove('shake'); c.classList.add('vanish'); });
        await sleep(300);
        tempCapsules.forEach(c => c.remove());

        while (box.length > 0) { let drawn = box.pop(); recordStat(drawn, false); }
        
        updateTable();
        document.getElementById('remaining-count').innerText = 0;
        showHugeTable();

        isAnimating = false;
        drawBtn.disabled = true; drawAllBtn.disabled = true;
        resultText.innerHTML = '✨ すべてのカプセルを開けました！ ✨'; resultText.className = '';
    }

    function showHugeTable() {
        const tableContainer = document.getElementById('huge-table-container');
        const table = document.getElementById('main-stats-table');
        const images = document.getElementById('table-images');
        table.classList.add('huge-mode'); images.classList.add('huge-images');
        tableContainer.appendChild(table); tableContainer.appendChild(images);
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeHugeTable() {
        const rightPanel = document.getElementById('normal-table-container');
        const table = document.getElementById('main-stats-table');
        const images = document.getElementById('table-images');
        
        // 既に移動済み（非表示）なら何もしない
        if (!table.classList.contains('huge-mode')) return;

        table.classList.remove('huge-mode'); images.classList.remove('huge-images');
        rightPanel.appendChild(table); rightPanel.appendChild(images);
        document.getElementById('modal-overlay').style.display = 'none';
        
        if(box.length === 0) {
            resetBtn.style.transform = 'scale(1.1)'; resetBtn.style.backgroundColor = '#ff4757';
            setTimeout(() => { resetBtn.style.transform = 'scale(1)'; resetBtn.style.backgroundColor = '#6c757d'; }, 1000);
        }
    }

    drawBtn.addEventListener('click', () => playGacha(null));
    drawAllBtn.addEventListener('click', playDrawAll);
    resetBtn.addEventListener('click', initBox);

    initBox();
</script>

</body>
</html>
