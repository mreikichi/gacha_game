<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Page</title>
    <style>
        /* 画面全体の設定 */
        body {
            margin: 0;
            padding: 0;
            /* 画面の高さを100%に指定 */
            height: 100vh; 
            /* フレックスボックスを使って上下左右の中央に配置 */
            display: flex;
            justify-content: center;
            align-items: center;
            /* 隠しページらしい少しダークな背景色 */
            background-color: #2c3e50; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* メッセージエリアの設定 */
        .message-box {
            text-align: center;
            /* フワッと表示させるアニメーション */
            animation: fadeInPop 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        /* 「よく見つけたね」の文字スタイル */
        h1 {
            color: #f1c40f; /* 宝物のようなゴールド色 */
            font-size: 3rem;
            margin: 0 0 15px 0;
            letter-spacing: 0.1em;
            text-shadow: 0 4px 10px rgba(241, 196, 15, 0.3);
        }

        /* サブメッセージのスタイル */
        p {
            color: #ecf0f1;
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 0.05em;
        }

        /* アニメーションの定義 */
        @keyframes fadeInPop {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="message-box">
        <h1>よく見つけたね</h1>
        <p>見つけられた君はラッキー!!!
            これから二週間よろしくね</p>
    </div>

</body>
</html>
